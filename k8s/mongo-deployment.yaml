apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "admin"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "secret"
            - name: MONGO_INITDB_DATABASE
              value: "stocks_data"
          volumeMounts:
            - name: mongo-storage      # must match the volume name below
              mountPath: /data/db      # where MongoDB stores its data inside the container
      volumes:
        - name: mongo-storage          # the name used to connect these two sections
          persistentVolumeClaim:
            claimName: mongo-pvc       # must match metadata.name in mongo-pvc.yaml