apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: stockanalysis-server:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          envFrom:
            - secretRef:
                name: server-secret