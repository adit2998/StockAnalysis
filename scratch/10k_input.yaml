# 10k_input.yaml — Paste your 10-K sections and analysis prompt below.
# Run: python analyze_10k.py [path/to/this/file]

prompt: |
  You are a senior equity analyst reading a company's 10-K filing.

  You have been given:
  1. Item 1 (Business section) of the filing
  2. Item 7 (MD&A section) of the filing  

  Your job is to interrogate this filing for strategic signals, not to summarise it.

  Answer each of the following questions with a specific, directional finding. Do not be vague.

  1. What does management say the strategy is — in one or two plain sentences?
  2. What are they clearly prioritising this year that they were not last year (based on emphasis and language)?  

  Return your response as a JSON array of findings. Each finding must have:
  - "question": the question number above
  - "observation": your specific finding (2–4 sentences, directional)
  - "signal": one of "positive", "negative", "neutral", "watch"
  - "source_reference": which item and approximate location in the text your finding draws from  

sections:
  business_overview: |
    Segments
    The Company manages its business primarily on a geographic basis. The Company’s reportable segments consist of the Americas, Europe, Greater China,
    Japan and Rest of Asia Pacific. Americas includes both North and South America. Europe includes European countries, as well as India, the Middle East and
    Africa. Greater China includes China mainland, Hong Kong and Taiwan. Rest of Asia Pacific includes Australia, New Zealand and those Asian countries not
    included in the Company’s other reportable segments. Although the reportable segments provide similar hardware and software products and similar services,
    each one is managed separately to better align with the location of the Company’s customers and distribution partners and the unique market dynamics of each
    geographic region.
    Markets and Distribution
    The Company’s customers are primarily in the consumer, small and mid-sized business, education, enterprise and government markets. The Company sells its
    products and resells third-party products in most of its major markets directly to customers through its retail and online stores and its direct sales force. The
    Company sells its services in the same markets through its various service platforms. The Company also employs a variety of indirect distribution channels, such
    as third-party cellular network carriers and other resellers, for the sale of its products and certain of its services. During 2025, the Company’s net sales through
    its direct and indirect distribution channels accounted for 40% and 60%, respectively, of total net sales.
    Competition
    The markets for the Company’s products and services are highly competitive and are characterized by aggressive price competition, downward pressure on
    gross margins, continual improvement in product performance, and price sensitivity on the part of consumers and businesses. The markets in which the
    Company competes are further defined by frequent introduction of new products and services, short product life cycles, evolving industry standards, and rapid
    adoption of technological advancements by competitors. Many of the Company’s competitors seek to compete primarily through aggressive pricing and very low
    cost structures, and by imitating the Company’s products and infringing on its intellectual property.  

  mda: |
    Beginning in the second quarter of 2025, new U.S. Tariffs were announced, including additional tariffs on imports from China, India, Japan, South Korea, Taiwan,
    Vietnam and the EU, among others. In response, several countries have imposed, or threatened to impose, reciprocal tariffs on imports from the U.S. and other
    retaliatory measures. Various modifications to the U.S. Tariffs have been announced and further changes could be made in the future, which may include
    additional sector-based tariffs or other measures. For example, the U.S. Department of Commerce has initiated an investigation under Section 232 of the Trade
    Expansion Act of 1962, as amended, into, among other things, imports of semiconductors, semiconductor manufacturing equipment, and their derivative
    products, including downstream products that contain semiconductors. Tariffs and other measures that are applied to the Company’s products or their
    components can have a material adverse impact on the Company’s business, results of operations and financial condition, including impacting the Company’s
    supply chain, the availability of rare earths and other raw materials and components, pricing and gross margin. The ultimate impact remains uncertain and will
    depend on several factors, including whether additional or incremental U.S. Tariffs or other measures are announced or imposed, to what extent other countries
    implement tariffs or other retaliatory measures in response, and the overall magnitude and duration of these measures. Trade and other international disputes
    can have an adverse impact on the overall macroeconomic environment and result in shifts and reductions in consumer spending and negative consumer
    sentiment for the Company’s products and services, all of which can further adversely affect the Company’s business and results of operations.

    The Company’s effective tax rate for 2025 was lower than the statutory federal income tax rate primarily due to a lower effective tax rate on foreign earnings,
    including the impact of changes in unrecognized tax benefits, the impact of the U.S. federal R&D credit, and tax benefits from share-based compensation,
    partially offset by a change in valuation allowance and state income taxes.
    The Company’s effective tax rate for 2025 was lower compared to 2024 due to a $10.7 billion year-over-year decrease in the provision for income taxes related
    to the State Aid Decision (refer to Note 7, “Income Taxes” in the Notes to Consolidated Financial Statements in Part II, Item 8 of this Form 10-K) and the impact
    of changes in unrecognized tax benefits, partially offset by a change in valuation allowance and a higher effective tax rate on foreign earnings.

    Critical Accounting Estimates
    The preparation of financial statements and related disclosures in conformity with U.S. generally accepted accounting principles (“GAAP”) and the Company’s
    discussion and analysis of its financial condition and operating results require the Company’s management to make judgments, assumptions and estimates that
    affect the amounts reported. Note 1, “Summary of Significant Accounting Policies” of the Notes to Consolidated Financial Statements in Part II, Item 8 of this
    Form 10-K describes the significant accounting policies and methods used in the preparation of the Company’s consolidated financial statements. Management
    bases its estimates on historical experience and on various other assumptions it believes to be reasonable under the circumstances, the results of which form
    the basis for making judgments about the carrying values of assets and liabilities.