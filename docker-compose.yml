version: "3.8"

services:

  frontend:
    image: stockanalysis-frontend:local
    build: ./fundamental-analysis  # path to your React app folder
    ports:
      - "3000:3000"
    volumes:
      - ./fundamental-analysis:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true  # needed for hot reload to work inside Docker

  # ── Node Backend ────────────────────────────────────────────────
  server:
    image: stockanalysis-server:local
    build: ./Backend/node-backend
    container_name: stockanalysis-server
    env_file:
      - ./Backend/node-backend/.env 
    ports:
      - "5001:5001"
    environment:
      MONGO_URI: mongodb://admin:secret@mongo:27017/stockanalysis?authSource=admin
    depends_on:
      - mongo
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7        # pulls official image straight from Docker Hub
    container_name: stockanalysis-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: stocks_data
    restart: unless-stopped

volumes:
  mongo_data: